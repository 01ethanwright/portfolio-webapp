<div class="modal-backdrop" (click)="close()" *ngIf="visible">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2>Contact Form</h2>
    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      <label>
        Name
        <input formControlName="name" type="text" [disabled]="loading" />
        <div class="field-error" *ngIf="contactForm.get('name')?.touched && contactForm.get('name')?.invalid">
          Name is required.
        </div>
      </label>
      <label>
        Email
        <input formControlName="email" type="email" [disabled]="loading" />
        <div class="field-error" *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.invalid">
          Valid email is required.
        </div>
      </label>
      <label>
        Message
        <textarea formControlName="message" [disabled]="loading"></textarea>
        <div class="field-error" *ngIf="contactForm.get('message')?.touched && contactForm.get('message')?.invalid">
          Message is required.
        </div>
      </label>
      <div class="error-banner" *ngIf="errorMsg">{{ errorMsg }}</div>
      <button type="submit" [disabled]="loading">
        <span *ngIf="!loading">Send</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
      <button type="button" (click)="close()" [disabled]="loading">Cancel</button>
    </form>
  </div>
</div>
